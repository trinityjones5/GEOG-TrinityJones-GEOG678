<!DOCTYPE html>
<html>
<head>
    <title>Gabriel's First Web Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Initialize map
    var map = L.map('map').fitWorld();

    // Add basemap
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Coordinates
    var kyleField = [30.6084, -96.3402];
    var omBuilding = [30.6179, -96.3386];
    var academicBuilding = [30.6159, -96.3413];

    // Locate user
    map.locate({setView: true, maxZoom: 16});

    function onLocationFound(e) {
        var radius = e.accuracy / 2;

        L.marker(e.latlng).addTo(map)
            .bindPopup("You are within " + radius + " meters from this point")
            .openPopup();

        L.circle(e.latlng, radius).addTo(map);
    }

    function onLocationError(e) {
        alert("Location access denied. Showing Kyle Field.");
        map.setView(kyleField, 15);
    }

    map.on('locationfound', onLocationFound);
    map.on('locationerror', onLocationError);

    // ✅ 1. Circle around Kyle Field
    L.circle(kyleField, {
        color: 'red',
        fillColor: '#f03',
        fillOpacity: 0.5,
        radius: 300
    }).addTo(map)
      .bindPopup("Kyle Field");

    // ✅ 2. Custom icons
    var customIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
        iconSize: [30, 30],
        iconAnchor: [15, 30],
        popupAnchor: [0, -30]
    });

    // O&M Building
    L.marker(omBuilding, {icon: customIcon})
        .addTo(map)
        .bindPopup("O&M Building");

    // Academic Building
    L.marker(academicBuilding, {icon: customIcon})
        .addTo(map)
        .bindPopup("Academic Building");

    // ✅ 3. Click event (show coordinates)
    function onMapClick(e) {
        L.popup()
            .setLatLng(e.latlng)
            .setContent("Coordinates: " + e.latlng.lat.toFixed(5) + ", " + e.latlng.lng.toFixed(5))
            .openOn(map);
    }

    map.on('click', onMapClick);

</script>

</body>
</html>
