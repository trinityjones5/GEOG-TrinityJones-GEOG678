<!DOCTYPE html>
<html>
<head>
  <title>Gabriel TAMU Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.1/dist/leaflet.css"/>

  <style>
    #mapid {
      height: 600px;
      width: 800px;
    }

    .info {
      padding: 6px;
      background: white;
    }
  </style>
</head>

<body>

<h1>TAMU Campus Map</h1>
<div id="mapid"></div>

<script src="https://unpkg.com/leaflet@1.3.1/dist/leaflet.js"></script>
<script src="tamubuildings.js"></script>

<script>

// TAMU location
var map = L.map('mapid').setView([30.6188, -96.3365], 15);

// base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// INFO BOX
var info = L.control();

info.onAdd = function(map) {
  this._div = L.DomUtil.create('div', 'info');
  this.update();
  return this._div;
};

// USE YOUR PROFESSOR SNIPPET HERE
info.update = function (props) {
  this._div.innerHTML = '<h4>BldgName and BldgAbbr</h4>' +  (props ?
      '<b>' + props.BldgName + '</b><br />' + props.BldgAbbr
      : 'Hover over a building');
};

info.addTo(map);

// STYLE
function style(feature) {
  return {
    fillColor: "#800000",
    weight: 2,
    color: "#800000",
    fillOpacity: 0.7
  };
}

// HOVER
function highlightFeature(e) {
  var layer = e.target;

  layer.setStyle({
    weight: 4,
    color: '#666',
    fillOpacity: 0.9
  });

  info.update(layer.feature.properties);
}

// RESET
function resetHighlight(e) {
  geojson.resetStyle(e.target);
  info.update();
}

// CLICK ZOOM
function zoomToFeature(e) {
  map.fitBounds(e.target.getBounds());
}

// EVENTS
function onEachFeature(feature, layer) {
  layer.on({
    mouseover: highlightFeature,
    mouseout: resetHighlight,
    click: zoomToFeature
  });
}

// LOAD DATA
var geojson = L.geoJSON(tamuBuildings, {
  style: style,
  onEachFeature: onEachFeature
}).addTo(map);

</script>

</body>
</html>
