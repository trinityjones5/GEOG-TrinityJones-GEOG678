<!DOCTYPE html>
<html>
<head>
  <title>TAMU Feature Layer Web Map</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.6/esri/css/main.css">
  <script src="https://js.arcgis.com/4.6/"></script>

  <style>
    html, body {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }

    #viewDiv {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="viewDiv"></div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/layers/FeatureLayer"
    ], function(Map, MapView, FeatureLayer) {

      const map = new Map({
        basemap: "streets"
      });

      const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-96.339, 30.617],
        zoom: 15
      });

      // ✅ YOUR FEATURE LAYER
      const featureLayer = new FeatureLayer({
        url: "https://services1.arcgis.com/qr14biwnHA6Vis6l/arcgis/rest/services/tamulandmark/FeatureServer"

      // ✅ POPUP CONFIG
      featureLayer.popupTemplate = {
        title: "{Name}",
        content: [
          {
            type: "fields",
            fieldInfos: [
              { fieldName: "Name" },
              { fieldName: "Descr" }
            ]
          }
        ]
      };

      map.add(featureLayer);
      view.goTo(featureLayer.fullExtent);

    });
  </script>
</body>
</html>
